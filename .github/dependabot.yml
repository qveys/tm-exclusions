version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Paris
    target-branch: master
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: ci
      include: scope
    labels:
      - "📦 Type: Dependency"
      - "🧩 Area: CI"
      - "🤖 Source: Dependabot"
      - "🧰 Ecosystem: github-actions"
      - "⏱️ Effort: Small"
      - "🔥 Priority: Low"
