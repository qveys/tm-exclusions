# tm-exclusions default configuration
# Format: type|target|reason
# Types:
#   path    = static exclusion target (exact path)
#   pattern = directory name matched during recursive scan
#   prune   = path ignored during scan (not excluded, just skipped)
#
# Paths starting with ~ are expanded to $HOME at runtime.
# Lines starting with # are comments and are ignored.

# ============================================================================
# Static path exclusions
# ============================================================================

# --- Node.js ---
path|~/.npm|npm cache
path|~/.yarn/cache|Yarn cache
path|~/.pnpm-store|pnpm content-addressable store

# --- Python ---
path|~/.cache/pip|pip download cache
path|~/.local/share/virtualenvs|pipenv virtualenvs

# --- Docker ---
path|~/.docker/desktop|Docker Desktop local data

# --- Rust ---
path|~/.cargo/registry|Cargo package registry cache
path|~/.cargo/git|Cargo git checkouts
path|~/.rustup/toolchains|Rust toolchain binaries

# --- Go ---
path|~/go/pkg/mod|Go module cache
path|~/.cache/go-build|Go build cache

# --- Java / JVM ---
path|~/.gradle/caches|Gradle caches
path|~/.gradle/wrapper|Gradle wrapper distributions
path|~/.m2/repository|Maven local repository

# --- Xcode ---
path|~/Library/Developer/Xcode/DerivedData|Xcode derived data
path|~/Library/Developer/Xcode/Archives|Xcode archives
path|~/Library/Developer/CoreSimulator|iOS Simulator data

# --- Homebrew ---
path|~/Library/Caches/Homebrew|Homebrew download cache

# --- AI / LLM ---
path|~/.cache/huggingface|Hugging Face model cache
path|~/.ollama/models|Ollama local models
path|~/.cache/lm-studio|LM Studio model cache

# --- IDE / Editor caches ---
path|~/Library/Caches/JetBrains|JetBrains IDE caches
path|~/Library/Caches/com.microsoft.VSCode|VS Code cache
path|~/Library/Caches/com.microsoft.VSCodeInsiders|VS Code Insiders cache

# ============================================================================
# Dynamic scan patterns (directory names to find and exclude)
# ============================================================================

# --- Node.js ---
pattern|node_modules|Node.js dependencies (regenerable via npm/yarn install)

# --- Python ---
pattern|.venv|Python virtual environment
pattern|venv|Python virtual environment
pattern|__pycache__|Python bytecode cache

# --- Rust ---
pattern|target|Rust/Cargo build output

# --- General build artifacts ---
pattern|dist|Build distribution output
pattern|build|Build output directory

# --- Next.js ---
pattern|.next|Next.js build cache

# --- Turborepo ---
pattern|.turbo|Turborepo cache

# --- iOS / CocoaPods ---
pattern|Pods|CocoaPods dependencies

# --- Gradle ---
pattern|.gradle|Gradle project cache

# ============================================================================
# Prune paths (skip scanning these trees, do not exclude them)
# ============================================================================

# Skip system and hidden directories that are not useful to scan
prune|~/Library|System library (too deep, handled by static rules)
prune|~/.Trash|Trash directory
